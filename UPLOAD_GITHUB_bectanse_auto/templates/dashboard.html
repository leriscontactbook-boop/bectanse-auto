<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bectanse AUTO — Espace Membre</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --purple:       #5B21B6;
  --purple-dark:  #3B0764;
  --purple-mid:   #4C1D95;
  --purple-light: #EDE9FE;
  --purple-faint: rgba(91,33,182,0.08);
  --gold:         #F59E0B;
  --gold-light:   rgba(245,158,11,0.12);
  --dark:         #0A0A0F;
  --dark-2:       #111827;
  --dark-3:       #1F2937;
  --white:        #FFFFFF;
  --grey:         #6B7280;
  --grey-light:   #374151;
  --green:        #059669;
  --green-bg:     rgba(5,150,105,0.12);
  --red:          #DC2626;
  --red-bg:       rgba(220,38,38,0.1);
  --border:       rgba(91,33,182,0.2);
  --border-hover: rgba(91,33,182,0.4);
  --sidebar-w:    260px;
}

html, body { min-height: 100vh; font-family: 'Barlow', sans-serif; background: var(--dark); color: var(--white); }

/* ── LAYOUT ── */
.app { display: flex; min-height: 100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  background: rgba(17,24,39,0.95);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  backdrop-filter: blur(20px);
  overflow-y: auto;
  overflow-x: hidden;
}

.sidebar-brand {
  padding: 10px 14px 8px;
  border-bottom: 1px solid var(--border);
}

.sidebar-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 19px;
  letter-spacing: 0.08em;
  color: var(--gold);
  text-shadow: 0 0 24px rgba(245,158,11,0.35);
  line-height: 1;
}

.sidebar-tagline {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.25);
  text-transform: uppercase;
  margin-top: 3px;
}

/* Member card */
.member-card {
  margin: 16px 16px 0;
  background: var(--purple-faint);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
}

.member-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 2px;
}

.member-capital {
  font-size: 12px;
  color: var(--gold);
  font-weight: 500;
}

.member-code {
  font-size: 10px;
  color: rgba(255,255,255,0.25);
  margin-top: 4px;
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.1em;
}

/* Nav */
.nav { padding: 20px 12px; flex: 1; }

.nav-section {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.22em;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
  padding: 0 12px;
  margin-bottom: 6px;
  margin-top: 16px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 2px;
  text-decoration: none;
}

.nav-item:hover { background: var(--purple-faint); color: rgba(255,255,255,0.8); }
.nav-item.active { background: rgba(91,33,182,0.2); color: var(--white); }
.nav-item .icon { width: 16px; text-align: center; font-size: 14px; }

/* Status indicator */
.status-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  margin: 0 12px 16px;
  background: var(--green-bg);
  border: 1px solid rgba(5,150,105,0.25);
  border-radius: 8px;
  font-size: 11px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: #6EE7B7;
}

.pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; flex-shrink: 0; }
@keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(5,150,105,0.4)} 50%{opacity:0.7;box-shadow:0 0 0 4px rgba(5,150,105,0)} }

.logout-btn {
  margin: 0 12px 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 12px;
  border-radius: 8px;
  font-size: 12px;
  color: rgba(255,255,255,0.3);
  cursor: pointer;
  transition: all 0.15s;
  text-decoration: none;
}
.logout-btn:hover { color: var(--red); background: var(--red-bg); }

/* ── MAIN ── */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* Top bar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 32px;
  border-bottom: 1px solid var(--border);
  background: rgba(10,10,15,0.8);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 50;
}

.topbar-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: 0.02em;
}

.topbar-sub { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 1px; }

.save-btn {
  background: var(--purple);
  color: var(--white);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: none;
  border-radius: 8px;
  padding: 11px 24px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(91,33,182,0.35);
  position: relative;
  overflow: hidden;
}
.save-btn:hover { background: var(--purple-mid); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(91,33,182,0.5); }
.save-btn:active { transform: translateY(0); }
.save-btn.loading { opacity: 0.7; pointer-events: none; }

/* ── CONTENT ── */
.content { padding: 32px; max-width: 860px; }

/* Section card */
.section-card {
  background: rgba(17,24,39,0.7);
  border: 1px solid var(--border);
  border-radius: 16px;
  margin-bottom: 20px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.section-card:hover { border-color: var(--border-hover); }

.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(91,33,182,0.05);
}

.section-icon {
  width: 34px; height: 34px;
  border-radius: 8px;
  background: rgba(91,33,182,0.2);
  border: 1px solid rgba(91,33,182,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}

.section-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.section-desc {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  margin-top: 1px;
}

.section-body { padding: 22px 24px; }

/* Fields */
.field-row {
  display: grid;
  gap: 14px;
  margin-bottom: 14px;
}
.field-row.cols-3 { grid-template-columns: repeat(3, 1fr); }
.field-row.cols-2 { grid-template-columns: repeat(2, 1fr); }
.field-row.cols-1 { grid-template-columns: 1fr; }

.field { display: flex; flex-direction: column; gap: 6px; }

.field label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
}

.field select,
.field input[type="number"],
.field input[type="text"] {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(91,33,182,0.25);
  border-radius: 8px;
  padding: 10px 12px;
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--white);
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
  width: 100%;
  -moz-appearance: textfield;
}

.field select option { background: #1F2937; }

.field select:focus,
.field input:focus {
  border-color: var(--purple);
  box-shadow: 0 0 0 3px rgba(91,33,182,0.15);
}

.field-help {
  font-size: 10px;
  color: rgba(255,255,255,0.2);
  line-height: 1.4;
}

/* ── TOGGLES ── */
.toggle-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  transition: background 0.15s, border-color 0.15s;
  cursor: pointer;
}

.toggle-row:hover { background: rgba(91,33,182,0.06); border-color: var(--border); }

.toggle-info { flex: 1; }

.toggle-label {
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.8);
  margin-bottom: 2px;
}

.toggle-desc {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  line-height: 1.4;
}

/* Toggle switch */
.toggle-switch { position: relative; flex-shrink: 0; margin-left: 16px; }

.toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }

.toggle-track {
  display: block;
  width: 42px;
  height: 24px;
  background: rgba(255,255,255,0.1);
  border-radius: 100px;
  transition: background 0.25s;
  cursor: pointer;
  position: relative;
  border: 1px solid rgba(255,255,255,0.08);
}

.toggle-track::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  transition: transform 0.25s, background 0.25s;
}

.toggle-switch input:checked + .toggle-track {
  background: var(--purple);
  border-color: var(--purple);
}

.toggle-switch input:checked + .toggle-track::after {
  transform: translateX(18px);
  background: var(--white);
}

/* ── DRAWDOWN PANELS ── */
.dd-panel {
  margin-top: 14px;
  padding: 14px 16px;
  background: rgba(91,33,182,0.06);
  border: 1px solid rgba(91,33,182,0.2);
  border-radius: 10px;
  display: none;
}
.dd-panel.visible { display: block; }

/* ── PERIODE PILLS ── */
.period-pills {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.period-pill {
  padding: 8px 18px;
  border-radius: 100px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.05em;
  border: 1px solid rgba(91,33,182,0.3);
  background: rgba(255,255,255,0.03);
  color: rgba(255,255,255,0.45);
  cursor: pointer;
  transition: all 0.15s;
}

.period-pill:hover { border-color: var(--purple); color: rgba(255,255,255,0.8); }
.period-pill.active { background: var(--purple); border-color: var(--purple); color: var(--white); }

input[name="objectif_periode"] { display: none; }

/* ── HISTORIQUE ── */
.hist-table { width: 100%; border-collapse: collapse; }

.hist-table th {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  text-align: left;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}

.hist-table td {
  font-size: 12px;
  color: rgba(255,255,255,0.65);
  padding: 10px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}

.hist-table tr:last-child td { border-bottom: none; }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 100px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.badge-wait { background: rgba(245,158,11,0.15); color: #FCD34D; border: 1px solid rgba(245,158,11,0.3); }
.badge-ok   { background: var(--green-bg);         color: #6EE7B7; border: 1px solid rgba(5,150,105,0.3); }

.empty-hist {
  text-align: center;
  padding: 28px;
  color: rgba(255,255,255,0.2);
  font-size: 13px;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 28px;
  right: 28px;
  z-index: 9999;
  background: #1F2937;
  border: 1px solid rgba(91,33,182,0.4);
  border-radius: 12px;
  padding: 14px 20px;
  font-size: 13px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  max-width: 360px;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: rgba(5,150,105,0.4); }
.toast.error   { border-color: rgba(220,38,38,0.4); }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .content { padding: 16px; }
  .field-row.cols-3 { grid-template-columns: 1fr; }
  .field-row.cols-2 { grid-template-columns: 1fr; }
  .topbar { padding: 14px 16px; }
}

/* ── LOT PAR SYMBOLE ── */
.lot-symbole-panel { display:none; margin-top:16px; }
.lot-symbole-panel.visible { display:block; }
.lot-symbole-header {
  display:grid; grid-template-columns:1fr 1fr 1fr 1fr auto;
  gap:8px; padding:8px 12px;
  background:rgba(91,33,182,0.15);
  border-radius:10px 10px 0 0;
  border:1px solid rgba(91,33,182,0.25);
  border-bottom:none;
}
.lot-symbole-header span {
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px; font-weight:700;
  letter-spacing:0.14em; text-transform:uppercase;
  color:rgba(255,255,255,0.4);
}
.lot-symbole-apply {
  background:var(--purple); color:#fff;
  border:none; border-radius:6px;
  padding:5px 14px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px; font-weight:700;
  cursor:pointer; letter-spacing:0.08em;
}
.lot-symbole-apply:hover { background:var(--purple-mid); }
.lot-symbole-search {
  width:100%; background:rgba(255,255,255,0.04);
  border:1px solid rgba(91,33,182,0.2);
  border-radius:8px; padding:9px 12px;
  color:#fff; font-size:13px; outline:none;
  margin-bottom:10px;
}
.lot-symbole-search::placeholder { color:rgba(255,255,255,0.2); }
.lot-symbole-table {
  border:1px solid rgba(91,33,182,0.2);
  border-radius:0 0 10px 10px;
  overflow:hidden; max-height:380px; overflow-y:auto;
}
.lot-symbole-row {
  display:grid; grid-template-columns:1fr 2fr auto;
  gap:12px; align-items:center;
  padding:10px 14px;
  border-bottom:1px solid rgba(255,255,255,0.04);
  transition:background 0.12s;
}
.lot-symbole-row:last-child { border-bottom:none; }
.lot-symbole-row:hover { background:rgba(91,33,182,0.06); }
.sym-name { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; color:#fff; }
.sym-desc { font-size:11px; color:rgba(255,255,255,0.35); }
.sym-lot {
  width:80px; background:rgba(255,255,255,0.04);
  border:1px solid rgba(91,33,182,0.2); border-radius:6px;
  padding:6px 8px; color:#fff; font-size:13px;
  text-align:center; outline:none;
  -moz-appearance:textfield;
}
.sym-lot:focus { border-color:var(--purple); box-shadow:0 0 0 2px rgba(91,33,182,0.15); }


/* ── COPY TRADING TOGGLE ── */
.copy-toggle-wrap {
  margin: 0 12px 16px;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid rgba(91,33,182,0.3);
}
.copy-toggle-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border: none;
  cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  transition: all 0.2s;
}
.copy-toggle-btn.actif {
  background: rgba(5,150,105,0.15);
  color: #6EE7B7;
}
.copy-toggle-btn.inactif {
  background: rgba(220,38,38,0.12);
  color: #FCA5A5;
}
.copy-toggle-btn:hover { filter: brightness(1.15); }
.copy-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.copy-dot.actif { background: #059669; box-shadow: 0 0 8px rgba(5,150,105,0.6); animation: pulse 2s infinite; }
.copy-dot.inactif { background: #DC2626; }
.copy-status-label { flex: 1; text-align: left; margin-left: 10px; }
.copy-arrow { font-size: 16px; opacity: 0.6; }
.copy-confirm {
  display: none;
  padding: 12px 16px;
  background: rgba(0,0,0,0.3);
  border-top: 1px solid rgba(255,255,255,0.06);
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  text-align: center;
}
.copy-confirm.show { display: block; }
.copy-confirm-btns { display: flex; gap: 8px; margin-top: 8px; }
.copy-confirm-yes {
  flex: 1; padding: 7px; border: none; border-radius: 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 700; cursor: pointer;
  background: var(--purple); color: #fff;
}
.copy-confirm-no {
  flex: 1; padding: 7px; border: none; border-radius: 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 700; cursor: pointer;
  background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6);
}


/* ── TOOLTIPS INFO ── */
.info-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: rgba(91,33,182,0.25);
  border: 1px solid rgba(91,33,182,0.4);
  color: rgba(255,255,255,0.6);
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
  flex-shrink: 0;
  margin-left: 8px;
  position: relative;
  transition: background 0.15s;
  font-style: normal;
}
.info-btn:hover { background: rgba(91,33,182,0.5); color: #fff; }

.tooltip-box {
  display: none;
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  width: 240px;
  background: #1F2937;
  border: 1px solid rgba(91,33,182,0.4);
  border-radius: 10px;
  padding: 10px 12px;
  font-family: 'Barlow', sans-serif;
  font-size: 12px;
  font-weight: 400;
  color: rgba(255,255,255,0.8);
  line-height: 1.5;
  z-index: 999;
  text-align: left;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  pointer-events: none;
  letter-spacing: 0;
  text-transform: none;
}
.tooltip-box::after {
  content: '';
  position: absolute;
  top: 100%; left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent;
  border-top-color: rgba(91,33,182,0.4);
}
.info-btn:hover .tooltip-box,
.info-btn:focus .tooltip-box { display: block; }


/* ── ALERTE RENOUVELLEMENT ── */
.alerte-banner {
  background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(234,88,12,0.1));
  border: 1px solid rgba(245,158,11,0.4);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  animation: pulse-border 2s ease-in-out infinite;
}
@keyframes pulse-border {
  0%,100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.2); }
  50%      { box-shadow: 0 0 0 6px rgba(245,158,11,0); }
}
.alerte-text { flex: 1; }
.alerte-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px; font-weight: 700;
  color: #FCD34D; letter-spacing: 0.04em;
  margin-bottom: 3px;
}
